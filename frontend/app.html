<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Country Tree + Transformation Visualizer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
    <div class="container">
      <a class="navbar-brand fw-bold text-primary" href="./index.html">
        🌍 Country Visualizer
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="./index.html">Home</a>
        <a class="nav-link" href="./app.html">Explorer</a>
      </div>
    </div>
  </nav>

  <div id="appShell">
    <main class="layout">
      <div class="mode-selector mb-4">
        <div class="btn-group" role="group" aria-label="Mode selector">
          <input type="radio" class="btn-check" name="mode" id="explorer-mode" autocomplete="off" checked>
          <label class="btn btn-outline-primary" for="explorer-mode">Country Explorer</label>
          <input type="radio" class="btn-check" name="mode" id="similarity-mode" autocomplete="off">
          <label class="btn btn-outline-primary" for="similarity-mode">Country Similarity</label>
        </div>
      </div>
    <section id="page-explorer" class="panel page active">
      <div class="panel-head">
        <h2>Country Explorer</h2>
        <div class="controls inline">
          <label for="countrySelect">Country</label>
          <input type="text" id="countrySearch" placeholder="Search countries..." />
          <select id="countrySelect"></select>
          <label for="viewMode">View</label>
          <select id="viewMode">
            <option value="both">Tree & Table</option>
            <option value="tree">Tree Only</option>
            <option value="table">Table Only</option>
          </select>
        </div>
      </div>
      <div id="explorerContent">
        <div class="split wide">
          <article class="card">
            <div class="card-head">
              <h3>Node Tree</h3>
            </div>
            <div id="countryGraph" class="graph scroll"></div>
          </article>
          <article class="card">
            <div class="card-head">
              <h3>Node Details</h3>
            </div>
            <div id="countryTable" class="scroll"></div>
          </article>
        </div>
      </div>
      <div id="countryTree" class="sr-only"></div>
    </section>

    <section id="page-similarity" class="panel page">
      <div class="panel-head">
        <h2>Country Similarity</h2>
        <div class="controls compare-inline">
          <div>
            <label for="sourceSelect">Source Country</label>
            <input type="text" id="sourceSearch" placeholder="Search countries..." />
            <select id="sourceSelect"></select>
          </div>
          <div>
            <label for="targetSelect">Target Country</label>
            <input type="text" id="targetSearch" placeholder="Search countries..." />
            <select id="targetSelect"></select>
          </div>
          <button id="compareBtn" type="button">Compare</button>
        </div>
      </div>

      <div class="summary-grid">
        <div class="card highlight" id="similarityCard">
          <div class="card-head">
            <h3>Similarity Score</h3>
          </div>
          <div id="scoreValue" class="score-value">--</div>
          <p class="score-sub" id="scoreExplain">Select two countries to compute similarity.</p>
        </div>
        <div class="card">
          <div class="card-head">
            <h3>Metrics</h3>
          </div>
          <div class="stats" id="stats"></div>
        </div>
      </div>

      <div class="op-filter-row">
        <label for="opFilter" class="mb-0">Show operations</label>
        <select id="opFilter">
          <option value="ALL">All</option>
          <option value="DEL">Deletes</option>
          <option value="INS">Inserts</option>
          <option value="UPD">Updates</option>
        </select>
        <label for="treeViewMode" class="mb-0 ms-3">Show trees</label>
        <select id="treeViewMode">
          <option value="both">Both</option>
          <option value="source">Source only</option>
          <option value="target">Target only</option>
        </select>
      </div>

      <div class="split">
        <article class="card">
          <div class="card-head">
            <h3 id="sourceTitle">Source Tree</h3>
          </div>
          <div id="sourceGraph" class="graph scroll"></div>
        </article>
        <article class="card">
          <div class="card-head">
            <h3 id="targetTitle">Target Tree</h3>
          </div>
          <div id="targetGraph" class="graph scroll"></div>
        </article>
      </div>

      <div class="phases">
        <article class="card">
          <div class="card-head">
            <h3>Deletes</h3>
          </div>
          <div id="delOps" class="scroll"></div>
        </article>
        <article class="card">
          <div class="card-head">
            <h3>Inserts</h3>
          </div>
          <div id="insOps" class="scroll"></div>
        </article>
        <article class="card">
          <div class="card-head">
            <h3>Updates</h3>
          </div>
          <div id="updOps" class="scroll"></div>
        </article>
      </div>
    </section>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
